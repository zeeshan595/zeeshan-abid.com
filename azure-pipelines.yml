trigger:
- master

pool:
  vmImage: ubuntu-latest


stages:
  - stage: 
    displayName: 'Build & Deploy'
    jobs:
      - job:
        displayName: 'Build & Deploy'
        steps:
          - task: Npm@1
            displayName: 'Installing Packages'
            inputs:
              command: 'install'
          - task: Npm@1
            displayName: 'Building Website'
            inputs:
              command: 'custom'
              customCommand: 'build'
          - task: AzureFileCopy@4
            displayName: 'Deploying Website'
            inputs:
              SourcePath: 'dist'
              azureSubscription: 'Pay-As-You-Go(83d957fb-f04e-4e3e-9b1c-180bb7c9eb71)'
              Destination: 'AzureBlob'
              storage: 'zeeshanabidweb'
              ContainerName: '$web'
          - task: AzureFileCopy@4
            displayName: 'Uploading Assets'
            inputs:
              SourcePath: 'assets'
              azureSubscription: 'Pay-As-You-Go(83d957fb-f04e-4e3e-9b1c-180bb7c9eb71)'
              Destination: 'AzureBlob'
              storage: 'zeeshanabidweb'
              ContainerName: '$web'
              BlobPrefix: 'assets'